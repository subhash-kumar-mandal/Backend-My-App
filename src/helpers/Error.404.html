<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
      );
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 700px;
    }

    .error-code {
      font-size: 10rem;
      font-weight: bold;
      line-height: 1;
      background: linear-gradient(
        45deg,
        #38bdf8,
        #818cf8
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      margin-top: 1rem;
      font-size: 2.5rem;
    }

    p {
      margin-top: 1rem;
      color: #cbd5e1;
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .btn {
      display: inline-block;
      margin-top: 2rem;
      text-decoration: none;
      background: #3b82f6;
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-3px);
      background: #2563eb;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      animation: move 12s linear infinite;
    }

    .circle:nth-child(1) {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -100px;
    }

    .circle:nth-child(2) {
      width: 200px;
      height: 200px;
      bottom: -80px;
      right: -50px;
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes move {
      from {
        transform: rotate(0deg)
          translateX(30px)
          rotate(0deg);
      }
      to {
        transform: rotate(360deg)
          translateX(30px)
          rotate(-360deg);
      }
    }

    @media (max-width: 768px) {
      .error-code {
        font-size: 7rem;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <div class="error-code">404</div>

    <h1>Oops! Page Not Found</h1>

    <p>
      The page you are looking for might have been
      removed, renamed, or is temporarily unavailable.
    </p>

    <a href="/" class="btn">
      Go Back Home
    </a>
  </div>
</body>
</html>
